name: Build DLL

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build DLL (Release x64)
        run: msbuild "DirectInputForceFeedback~/DirectInputForceFeedback/DirectInputForceFeedback.vcxproj" /p:Configuration=Release /p:Platform=x64

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: DirectInputForceFeedback
          path: DirectInputForceFeedback~/DirectInputForceFeedback/x64/Release/DirectInputForceFeedback.dll
